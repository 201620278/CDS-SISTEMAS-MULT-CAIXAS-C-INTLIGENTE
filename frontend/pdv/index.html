<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDS PDV — Frente de Caixa</title>
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pdv.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebar" class="col-md-2 col-lg-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-2" id="sidebar-brand">
                        <h5 class="text-white">CDS</h5>
                        <small class="text-muted">PDV</small>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="#" data-page="pdv">
                                <i class="fas fa-shopping-basket"></i> Venda
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="consulta">
                                <i class="fas fa-search-dollar"></i> Consulta de Preço
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="clientes">
                                <i class="fas fa-users"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="caixa">
                                <i class="fas fa-hand-holding-usd"></i> Sangria / Suprimento
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="caixa">
                                <i class="fas fa-cash-register"></i> Fechamento de Caixa
                            </a>
                        </li>
                        <li class="nav-item" data-recurso="fiscal">
                            <a class="nav-link text-white" href="#" data-page="pdv">
                                <i class="fas fa-file-invoice"></i> NFC-e
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="tef">
                                <i class="fas fa-credit-card"></i> TEF
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="reimpressao">
                                <i class="fas fa-print"></i> Reimpressão de Cupom
                            </a>
                        </li>
                        <li class="nav-item" id="nav-abrir-erp">
                            <a class="nav-link text-info" href="/erp">
                                <i class="fas fa-building"></i> Abrir ERP
                            </a>
                        </li>
                    </ul>

                    <div class="sidebar-footer">
                        <div class="text-white mb-2 small">
                            <i class="fas fa-user"></i> <span id="user-nome">Carregando...</span>
                            <br>
                            <small id="user-perfil" class="text-muted">-</small>
                        </div>
                        <button class="btn btn-danger btn-sm w-100" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4 position-relative">
                <div id="page-content">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Carregando PDV...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-container"></div>

    <script src="/vendor/jquery/jquery.min.js"></script>
    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/access-control.js"></script>
    <script src="/shared/js/core.js"></script>
    <script src="/js/modoFiscalHelpers.js"></script>
    <script src="/shared/js/tefFluxoPagamento.js"></script>
    <script src="/pdv/js/pdv.js"></script>
    <script src="/pdv/js/caixa.js"></script>
    <script src="/pdv/js/clientes.js"></script>
    <script src="/pdv/js/vendas.js"></script>
    <script src="/pdv/js/app.js"></script>

    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none;"></div>

    <footer style="position: fixed; bottom: 0; width: 100%; background: #111827; color: #9ca3af; text-align: center; padding: 6px; font-size: 12px; z-index: 1000;">
        &copy; CDS Sistemas — PDV (Frente de Caixa)
    </footer>

    <script>
        $(document).ready(function() {
            const user = typeof obterUsuarioLogado === 'function' ? obterUsuarioLogado() : {};
            if (typeof isUsuarioAdministrador === 'function' && isUsuarioAdministrador(user)) {
                $('#nav-abrir-erp').show();
            } else {
                $('#nav-abrir-erp').hide();
            }
        });
    </script>
</body>
</html>
