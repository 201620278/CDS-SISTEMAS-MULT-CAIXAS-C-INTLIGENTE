<div class="configuracao-tef-page">
  <div class="configuracao-tef-header">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h3 class="mb-0"><i class="fas fa-credit-card"></i> Configuração TEF</h3>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-primary btn-sm" id="btnSalvarConfiguracaoTEF">
          <i class="fas fa-save"></i> Salvar
        </button>
        <button type="button" class="btn btn-secondary btn-sm" id="btnVoltarConfigAvancadas">
          <i class="fas fa-arrow-left"></i> Voltar
        </button>
      </div>
    </div>
  </div>

  <div class="configuracao-tef-tabs">
    <button class="configuracao-tef-tab active" data-aba="geral">Geral</button>
    <button class="configuracao-tef-tab" data-aba="empresa">Empresa</button>
    <button class="configuracao-tef-tab" data-aba="servidor">Servidor</button>
    <button class="configuracao-tef-tab" data-aba="pinpad">PinPad</button>
    <button class="configuracao-tef-tab" data-aba="operacoes">Operações</button>
    <button class="configuracao-tef-tab" data-aba="monitor">Monitor</button>
    <button class="configuracao-tef-tab" data-aba="diagnostico">Diagnóstico</button>
    <button class="configuracao-tef-tab" data-aba="reimpressao">Reimpressão</button>
  </div>

  <div id="configuracaoTefConteudo" class="configuracao-tef-conteudo">
    <!-- PinPads suportados: Gertec PPC930 (Rede/Itaú) via CliSiTef/PayGo -->
  </div>
</div>
